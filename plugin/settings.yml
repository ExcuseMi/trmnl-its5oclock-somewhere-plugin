---
strategy: polling
no_screen_padding: 'no'
dark_mode: 'no'
static_data: ''
polling_verb: get
polling_url: '{% assign h = trmnl.system.timestamp_utc | date: "%H" | plus: 0 %}{% assign offset = 17 | minus: h %}{% if offset > 14 %}{% assign offset = 14 %}{% endif %}{% if offset >= 0 %}https://raw.githubusercontent.com/ExcuseMi/trmnl-its5oclock-somewhere-plugin/refs/heads/main/data/cities/utc%2B{{ offset }}.json{% else %}https://raw.githubusercontent.com/ExcuseMi/trmnl-its5oclock-somewhere-plugin/refs/heads/main/data/cities/utc{{ offset }}.json{% endif %}'
polling_headers: ''
polling_body: ''
id: 253752
custom_fields:
- keyname: author_bio
  field_type: author_bio
  name: About This Plugin
  description: Discover a new city around the world where it's exactly 5 PM.<br />A live map shows you just where to raise your glass, because <strong>it's always 5 o'clock somewhere!</strong><br /><br />glass by Leonardo Henrique Martini from <a href="https://thenounproject.com/browse/icons/term/glass/" target="_blank" title="glass Icons">Noun Project</a> (CC BY 3.0)<br />Beer by Massfoday K Toure from <a href="https://thenounproject.com/browse/icons/term/beer/" target="_blank" title="Beer Icons">Noun Project</a> (CC BY 3.0)
  help_text: TRMNL X Ready
  category: life
  github_url: https://github.com/ExcuseMi/trmnl-its5oclock-somewhere-plugin
- keyname: pin_icon
  field_type: select
  name: Pin icon
  optional: false
  default: glass
  options:
  - Martini glass: glass
  - Beer mug: beer
- keyname: map_tiles
  field_type: select
  name: Map style
  optional: false
  default: osm
  options:
  - OpenStreetMap: osm
  - CartoDB Light: carto_light
  - CartoDB Light (no labels): carto_light_no_labels
- keyname: show_toast
  field_type: boolean
  name: Show local toast
  optional: false
  default: true
  description: Display a local toast phrase in the title bar — like <em>Cheers</em> or <em>Santé</em> — in the language spoken where it's 5 o'clock.
  help_text: Appears as an icon + phrase on the right side of the title bar.
name: " It's 5 O'Clock Somewhere"
refresh_interval: 60
