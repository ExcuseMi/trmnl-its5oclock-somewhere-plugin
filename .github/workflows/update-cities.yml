name: Update city timezone files

on:
  schedule:
    - cron: '0 */6 * * *'   # runs at 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:          # allow manual trigger from the Actions tab
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/update-cities.yml'
      - 'scripts/split_cities.py'
      - 'data/toasts.json'
      - 'data/timezone_overrides.json'

# Grant explicit permissions
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Cache GeoNames files
        uses: actions/cache@v4
        with:
          path: |
            cities15000.txt
            countryInfo.txt
            admin1CodesASCII.txt
          # Refresh GeoNames data at most once a week
          key: geonames-${{ github.run_id }}
          restore-keys: geonames-

      - name: Install dependencies
        run: pip install tzdata

      - name: Generate city offset files
        run: python scripts/split_cities.py

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: refresh city timezone files [skip ci]"
          commit_author: "GitHub Actions <actions@github.com>"
